services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: routage
      POSTGRES_PASSWORD: routage
      POSTGRES_DB: routage
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routage"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DB: tensorzero
      CLICKHOUSE_USER: chuser
      CLICKHOUSE_PASSWORD: chpassword
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    image: tensorzero/gateway:latest
    volumes:
      - ./config:/app/config:ro
    command: --config-file /app/config/tensorzero.toml
    environment:
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TENSORZERO_CLICKHOUSE_URL: http://chuser:chpassword@clickhouse:8123/tensorzero
      TENSORZERO_DISABLE_PSEUDONYMOUS_USAGE_ANALYTICS: "1"
    ports:
      - "3000:3000"
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  routage:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://routage:routage@postgres:5432/routage}
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: routage=info
      TENSORZERO_URL: http://gateway:3000/openai/v1
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_healthy

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3001:8080"
    environment:
      - OPENAI_API_BASE_URL=http://routage:8080/v1
      - OPENAI_API_KEY=not-needed
      - ENABLE_OLLAMA_API=false
      - WEBUI_AUTH=false
    depends_on:
      - routage
    restart: unless-stopped

  tensorzero-ui:
    image: tensorzero/ui:latest
    volumes:
      - ./config:/app/config:ro
    environment:
      TENSORZERO_CLICKHOUSE_URL: http://chuser:chpassword@clickhouse:8123/tensorzero
      TENSORZERO_GATEWAY_URL: http://gateway:3000
      TENSORZERO_UI_CONFIG_PATH: /app/config/tensorzero.toml
    ports:
      - "4000:4000"
    depends_on:
      clickhouse:
        condition: service_healthy
      gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  clickhouse-data:
